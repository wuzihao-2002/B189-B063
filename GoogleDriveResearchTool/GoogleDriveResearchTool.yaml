# 調査対象フォルダ※1つフォルダーだけ指定する
GoogleFileURI:
  "https://drive.google.com/drive/folders/PVA"
# 調査対象ユーザー(複数可)※「ALL」の場合、ユーザー限定なし
UserAccount:
  ['ALL']
# フォルダアクセスユーザー情報出力(0:アクセスユーザー情報出力しない、1:アクセスユーザー情報出力する)
AccessUserExport:
  '1'
# 出力対象(0:フォルダだけ、1:フォルダとファイル共に)
StructOutputMode:
  '1'
# 調査結果ファイル出力バス
OutPutFilePath:
  '調査結果.tsv'

# ログレベル:(0:info、1:debug)
log_level:
  1

# すべての端末で使用可能なスレッド数と制限
MaxThreads_ProjectID:
  100

# 端末ファイル「IP_n.txt」の保存場所
RunningTerminalFile_URI:
  "https://drive.google.com/drive/folders/XXX"

# 自端末で使用可能な最大スレッド数
MaxThreads_Terminal:
  32

# 「IP_n.txt」更新計画(min)
TerminalFileUpdateSchedule:
  30
